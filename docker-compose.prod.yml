# =============================================================================
# Docker Compose - Production (AWS EC2)
# Yucale Service
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker-compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  db:
    image: postgres:15-alpine
    container_name: yucale_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-yucale}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ:-Asia/Tokyo}
      PGTZ: ${TZ:-Asia/Tokyo}
    command: >
      postgres
      -c log_timezone=${TZ:-Asia/Tokyo}
      -c timezone=${TZ:-Asia/Tokyo}
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=16MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-yucale}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Memory limit for t4g.micro (1GB total)
    deploy:
      resources:
        limits:
          memory: 128M

  backend:
    image: ghcr.io/tknknk/yucale/backend:latest
    container_name: yucale_backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-yucale}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      DEFAULT_BELONGING_LIST: ${DEFAULT_BELONGING_LIST:-S,A,T,B}
      DEFAULT_RESPONSE_OPTIONS: ${DEFAULT_RESPONSE_OPTIONS:-出席,欠席,未定}
      DEFAULT_ATTENDING_OPTIONS: ${DEFAULT_ATTENDING_OPTIONS:-出席}
      DEFAULT_CHECKBOX_LABEL: ${DEFAULT_CHECKBOX_LABEL:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      TZ: ${TZ:-Asia/Tokyo}
      # CORS allowed origins (comma-separated). Set to the public CloudFront
      # origin in production, e.g. https://xxxxx.cloudfront.net
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Public site URL used for links in Discord notifications (e.g. the
      # "Review" admin link). Set to the CloudFront URL in production; otherwise
      # notifications point at http://localhost:3000.
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Production logging: INFO level only
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_YUCALE: INFO
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: INFO
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 384M

  frontend:
    image: ghcr.io/tknknk/yucale/frontend:latest
    container_name: yucale_frontend
    restart: unless-stopped
    # Not published to the host: nginx is the entry point and reaches this
    # service internally via the app-network (frontend:3000).
    expose:
      - "3000"
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      NODE_ENV: production
      # Next.js standalone binds to $HOSTNAME (Docker sets it to the container ID),
      # so it only listens on the container IP. Force 0.0.0.0 to listen on loopback too.
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost): BusyBox wget resolves localhost to IPv6 ::1 first,
      # which the IPv4 0.0.0.0 listener does not accept.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 96M

  # Nginx reverse proxy: single entry point.
  # CloudFront connects to the EC2 host on port 3000 (app_port); nginx routes
  # /api/ and /calendar.ics to the backend and everything else to the frontend.
  nginx:
    image: nginx:alpine
    container_name: yucale_nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
