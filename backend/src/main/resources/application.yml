spring:
  application:
    name: yucale-backend

  jackson:
    time-zone: ${TZ:Asia/Tokyo}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
    timeout: 90d

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        # Secure attribute: false for local HTTP dev, true in production (set
        # APP_COOKIE_SECURE=true) where the browser reaches the site over HTTPS.
        # Kept in sync with the CSRF cookie via app.cookie.secure in SecurityConfig.
        secure: ${app.cookie.secure}
        same-site: lax
        max-age: 90d

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{requestId:-no-req}] [%X{user:-system}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    io.github.tknknk.yucale: INFO
    org.springframework.security: WARN

discord:
  webhook:
    url: ${DISCORD_WEBHOOK_URL:}

app:
  admin:
    email: ${ADMIN_EMAIL:}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  cookie:
    # Secure flag for session + CSRF cookies. false for local HTTP, true in prod.
    secure: ${APP_COOKIE_SECURE:false}
  security:
    login:
      max-failed-attempts: ${LOGIN_MAX_FAILED_ATTEMPTS:5}
      lock-duration-minutes: ${LOGIN_LOCK_DURATION_MINUTES:15}
    # Number of trusted reverse-proxy hops in front of the app. The client IP is
    # taken from that fixed position in [X-Forwarded-For..., remoteAddr], so a
    # client cannot spoof its IP to bypass rate limiting. 0 = trust none (use the
    # direct peer). Production behind CloudFront+nginx: set APP_TRUSTED_PROXY_COUNT=2.
    trusted-proxy-count: ${APP_TRUSTED_PROXY_COUNT:0}
  survey:
    default-belonging-list: ${DEFAULT_BELONGING_LIST:S,A,T,B}
    default-response-options: ${DEFAULT_RESPONSE_OPTIONS:出席,欠席,未定}
    default-attending-options: ${DEFAULT_ATTENDING_OPTIONS:出席}
    default-checkbox-label: ${DEFAULT_CHECKBOX_LABEL:}

ics:
  output:
    path: ${ICS_OUTPUT_PATH:./calendar.ics}
