# Test database configuration using H2
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Session configuration
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

# Disable Discord webhook for tests
app.discord.webhook-url=

# Admin email for tests
app.admin.email=admin@test.com

# ICS file configuration
app.ics.file-path=/tmp
app.ics.file-name=test-calendar.ics
